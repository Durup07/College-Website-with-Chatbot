<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4e54c8,#8f94fb);
}
.container{
background:#fff;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
h2{
text-align:center;
margin-bottom:20px;
color:#4e54c8;
}
input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}
button{
width:100%;
padding:12px;
background:#4e54c8;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}
button:hover{
background:#3b40a4;
}
.error{
color:red;
text-align:center;
margin-top:10px;
}
</style>
</head>
<body>

<div class="container">
<h2>👨‍🏫 Teacher Login</h2>

<select id="teacher">
<option value="">Select Teacher</option>
<option value="Rahul">Rahul</option>
<option value="Ajit">Ajit</option>
<option value="Vivek">Vivek</option>
<option value="Sumit">Sumit</option>
</select>

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<div class="error" id="error"></div>
</div>

<script>
// FIXED TEACHERS DATA
const teachers = {
"Rahul": "rahul123",
"Ajit": "ajit123",
"Vivek": "vivek123",
"Sumit": "sumit123"
};

function login(){
const name = document.getElementById("teacher").value;
const pass = document.getElementById("password").value;
const error = document.getElementById("error");

if(!name || !pass){
error.innerText = "Please select teacher and enter password";
return;
}

if(teachers[name] === pass){
localStorage.setItem("teacher", name);
window.location.href = "teacher.html"; 
}else{
error.innerText = "Invalid username or password";
}
}
</script>

</body>
</html>
